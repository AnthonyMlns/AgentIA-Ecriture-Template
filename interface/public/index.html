<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentIA-Ecriture — Tableau de bord</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>✎</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ─── Barre latérale ─── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1><span class="logo">✎</span> AgentIA</h1>
      <p class="subtitle">Ecriture assistée</p>
    </div>

    <nav id="nav">
      <div class="nav-section">
        <span class="nav-section-title">Projets</span>
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">◉</span> Tableau de bord
        </a>
        <a href="#" class="nav-item" data-view="nouveau-projet">
          <span class="nav-icon">＋</span> Nouveau projet
        </a>
      </div>

      <div class="nav-section" id="nav-genres">
        <span class="nav-section-title">Genres</span>
        <div id="genres-list"></div>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Ressources</span>
        <a href="#" class="nav-item" data-view="skills">
          <span class="nav-icon">⚙</span> Skills
        </a>
        <a href="#" class="nav-item" data-view="knowledge">
          <span class="nav-icon">◈</span> Knowledge
        </a>
        <a href="#" class="nav-item" data-view="logs">
          <span class="nav-icon">📋</span> Logs
        </a>
        <a href="#" class="nav-item" data-view="echantillons">
          <span class="nav-icon">◇</span> Échantillons
        </a>
      </div>
    </nav>

    <div id="auth-status"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-row">
        <span class="version">v1.0</span>
        <button id="btn-refresh" title="Rafraîchir">⟳</button>
      </div>
    </div>
  </aside>

  <!-- ─── Contenu principal ─── -->
  <main id="main">
    <header id="topbar">
      <div id="breadcrumb"></div>
      <div id="topbar-actions"></div>
    </header>

    <div id="content"></div>
  </main>

  <!-- ─── Templates ─── -->
  <template id="tmpl-genre-item">
    <a href="#" class="nav-item genre-link" data-genre="">
      <span class="nav-icon genre-icon"></span>
      <span class="genre-label"></span>
      <span class="genre-count badge"></span>
    </a>
  </template>

  <!-- Import marked.js pour le rendu Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
